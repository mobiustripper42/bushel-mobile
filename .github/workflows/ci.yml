name: CI

# Gates every PR (the automated half of the QA plan — see docs/QA_AND_DEPLOYMENT.md).
# Native app: no Playwright, no database, no Vercel preview. Just the checks that
# run on a laptop — typecheck, lint, unit tests. On-device verification is manual.
#
# Typed-routes caveat: app.json sets experiments.typedRoutes, whose defs
# (.expo/types/router.d.ts) are generated only by Metro (expo start/export) and
# stay gitignored. CI never boots Metro, so `Href` typechecks against expo-router's
# looser fallback here. Once route/`Link` code lands, add an `npx expo export`
# (or type-gen) step before typecheck to close the gap. See QA runbook § Layer 1.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --ci
